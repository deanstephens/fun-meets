<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Meets</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="stage">
    <!-- Room status bar, shown once joined -->
    <div id="topbar" class="topbar" hidden>
      <span class="room">Room <strong id="room-name">—</strong></span>
      <span class="dot">·</span>
      <span><strong id="peer-count">0</strong> connected</span>
      <button id="copy-link" class="ghost">Copy invite link</button>
      <button id="toggle-body" class="ghost">Hide bodies</button>
    </div>

    <!-- Your movable webcam tile (the .head is the webcam; the stick-figure
         body is appended by JS as a sibling so it isn't clipped). -->
    <div id="self" class="tile" hidden>
      <div class="head">
        <video id="self-video" autoplay playsinline muted></video>
      </div>
      <div class="tile-label">You</div>
    </div>

    <!-- Remote peer tiles are added here dynamically -->

    <!-- Start / permission overlay -->
    <div id="overlay">
      <div class="overlay-card">
        <h1>Fun Meets</h1>
        <p>A serverless, game-like video meeting space.</p>
        <p class="hint">Move your webcam around with <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>.</p>
        <p class="hint small">Share the room link after joining to invite others.</p>
        <button id="start-btn">Enable camera &amp; join</button>
        <p id="error" class="error" hidden></p>
      </div>
    </div>

    <!-- Persistent, collapsible chat panel (shown once joined) -->
    <section id="chatpanel" class="chatpanel" hidden aria-label="Chat">
      <header class="chatpanel-header">
        <span>Chat</span>
        <button id="chat-collapse" class="ghost" aria-label="Collapse chat">Hide ›</button>
      </header>
      <div id="chat-log" class="chat-log" aria-live="polite"></div>
      <form id="chat" class="chat" autocomplete="off">
        <input id="chat-input" type="text" maxlength="200"
               placeholder="Message… (Enter to send)" aria-label="Chat message" />
      </form>
    </section>

    <!-- Tab to reopen the chat when collapsed -->
    <button id="chat-open" class="chat-open" hidden aria-label="Open chat">
      Chat<span id="chat-unread" class="chat-unread" hidden>0</span>
    </button>

    <!-- Controls hint, shown once joined -->
    <div id="controls" class="controls" hidden>
      <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;·&nbsp; <kbd>Enter</kbd> chat</span>
    </div>
  </div>

  <!-- Public PeerJS broker client (signaling only; media is peer-to-peer) -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
